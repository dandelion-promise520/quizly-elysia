name: Deploy Frontend to Server

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/**'
      - 'packages/**'
      - package.json
      - bun.lock
      - turbo.json
      - .github/workflows/deploy-frontend.yml
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build --filter=frontend

      - name: Compress dist directory
        run: |
          tar -czf dist.tar.gz -C apps/frontend dist

      - name: Copy dist.tar.gz to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: dist.tar.gz
          target: /tmp

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            TARGET_DIR="/opt/1panel/www/sites/118.31.48.200-3001/index"

            # 确保目标根目录存在
            mkdir -p "$TARGET_DIR"

            # 如果存在旧的 dist 目录，先进行删除以防旧文件残留
            if [ -d "$TARGET_DIR/dist" ]; then
              echo "发现已存在的 dist 目录，正在删除..."
              rm -rf "$TARGET_DIR/dist"
            fi

            # 解压新的打包文件到目标目录
            echo "正在解压新的前端静态资源到 $TARGET_DIR..."
            tar -xzf /tmp/dist.tar.gz -C "$TARGET_DIR"

            # 清理传输到服务器的临时压缩包
            rm -f /tmp/dist.tar.gz
            echo "前端部署完成！"
