name: Deploy Backend to Server

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

env:
  # 阿里云镜像服务域名配置
  # GitHub Actions 构建机在海外，必须推送到阿里云公网域名
  ALIYUN_REGISTRY_PUB: registry.cn-hangzhou.aliyuncs.com
  # 你的服务器同样处于阿里云杭州地域，可以使用 VPC 内网域名拉取镜像，实现秒级拉取且完全免去公网流量费！
  ALIYUN_REGISTRY_VPC: registry-vpc.cn-hangzhou.aliyuncs.com
  # 镜像命名空间与名称（注意：此处格式通常为 [命名空间]/[镜像名]，请根据你在阿里云 ACR 创建的命名空间进行修改）
  IMAGE_NAME: quizly/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY_PUB }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ALIYUN_REGISTRY_PUB }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 使用内网域名登录阿里云镜像服务
            echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login ${{ env.ALIYUN_REGISTRY_VPC }} -u ${{ secrets.ALIYUN_USERNAME }} --password-stdin

            # 使用内网域名指定镜像全名
            IMAGE="${{ env.ALIYUN_REGISTRY_VPC }}/${{ env.IMAGE_NAME }}:latest"
            CONTAINER_NAME="quizly-backend"

            # 从内网高速拉取最新镜像
            docker pull $IMAGE

            # 停止并删除旧容器
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            # 运行新容器，注入 DATABASE_URL 并映射 3000 端口
            docker run -d \
              --name $CONTAINER_NAME \
              -p 3000:3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              --restart always \
              $IMAGE

            # 清理无用镜像以节省服务器空间
            docker image prune -f
