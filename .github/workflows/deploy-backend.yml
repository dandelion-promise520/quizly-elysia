name: Deploy Backend to Server

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t quizly-backend:latest -f apps/backend/Dockerfile .

      - name: Save and compress Docker image
        run: |
          docker save quizly-backend:latest | gzip > backend.tar.gz

      - name: Copy backend.tar.gz to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: backend.tar.gz
          target: /tmp

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 载入从 GitHub 传输过来的 Docker 镜像包
            docker load -i /tmp/backend.tar.gz

            CONTAINER_NAME="quizly-backend"

            # 停止并删除旧容器（如果存在）
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            # 运行新容器，注入 DATABASE_URL 并映射 3000 端口
            docker run -d \
              --name $CONTAINER_NAME \
              -p 3000:3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              --restart always \
              quizly-backend:latest

            # 及时清理传输过来的临时压缩包，避免占用服务器磁盘空间
            rm -f /tmp/backend.tar.gz

            # 清理无用的悬空镜像以节省服务器空间
            docker image prune -f
